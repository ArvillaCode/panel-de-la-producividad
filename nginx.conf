server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://krtthtzljlyewlngaklo.supabase.co https://*.supabase.co wss://*.supabase.co https://*.workers.dev https://api.github.com https://openrouter.ai https://*.r2.cloudflarestorage.com; img-src 'self' https: data: blob:; media-src 'self' https: data: blob:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.youtube.com; frame-src 'self' https://www.youtube.com https://player.vimeo.com https://drive.google.com https://assets.cdn.filesafe.space https://*.filesafe.space; frame-ancestors 'self'; object-src 'none'; base-uri 'self'" always;

    # Gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # Vite bundles include a content hash and can be cached permanently.
    location ~* ^/assets/.+\.(?:css|js)$ {
        expires 1y;
        access_log off;
    }

    # Public brand/media assets keep shorter caching because names are stable.
    location /assets/ {
        expires 30d;
        access_log off;
    }
}
