name: Deploy a Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}" \
            -o /dev/null -w "Coolify deploy status: %{http_code}"
